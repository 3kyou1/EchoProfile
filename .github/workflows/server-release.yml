# Build and upload EchoProfile WebUI server binaries.
# The server binary embeds frontend assets via rust-embed, so each archive contains
# one executable named echo-profile and does not require a separate dist/ folder.
name: Server Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: echo-profile-linux-x64
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: echo-profile-linux-arm64
            cross: true
          - platform: macos-14
            target: aarch64-apple-darwin
            artifact: echo-profile-macos-arm64
          - platform: macos-14
            target: x86_64-apple-darwin
            artifact: echo-profile-macos-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Linux arm64 cross-compilation tools
        if: matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y libwebkit2gtk-4.1-dev:arm64 libssl-dev:arm64 libglib2.0-dev:arm64 libappindicator3-dev:arm64 librsvg2-dev:arm64 patchelf
          mkdir -p ~/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build frontend
        run: just frontend-build

      - name: Build server binary
        working-directory: src-tauri
        run: cargo build --release --features webui-server --target ${{ matrix.target }}

      - name: Package server binary
        run: |
          mkdir -p release
          cp "src-tauri/target/${{ matrix.target }}/release/echo-profile" release/echo-profile
          chmod +x release/echo-profile
          tar -C release -czf "${{ matrix.artifact }}.tar.gz" echo-profile

      - name: Wait for release to be published
        run: |
          echo "Waiting for release ${GITHUB_REF_NAME} to be available..."
          for i in $(seq 1 60); do
            if gh api "repos/${{ github.repository }}/releases/tags/${GITHUB_REF_NAME}" >/dev/null 2>&1; then
              echo "Release ${GITHUB_REF_NAME} is available."
              exit 0
            fi
            echo "Release not found yet... (attempt $i/60)"
            sleep 10
          done
          echo "Release was not created by another workflow; creating it now."
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "EchoProfile ${GITHUB_REF_NAME}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload server archive
        run: gh release upload "${GITHUB_REF_NAME}" "${{ matrix.artifact }}.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish-checksums:
    needs: build-server
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets and compute checksums
        run: |
          BASE="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"
          : > CHECKSUMS.sha256
          for asset in echo-profile-macos-arm64 echo-profile-macos-x64 echo-profile-linux-arm64 echo-profile-linux-x64; do
            curl -fsSL -o "${asset}.tar.gz" "${BASE}/${asset}.tar.gz"
            sha=$(sha256sum "${asset}.tar.gz" | cut -d' ' -f1)
            printf "%s  %s\n" "${sha}" "${asset}.tar.gz" >> CHECKSUMS.sha256
          done

      - name: Upload checksums
        run: gh release upload "${GITHUB_REF_NAME}" CHECKSUMS.sha256 --clobber -R "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}

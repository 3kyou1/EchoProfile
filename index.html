<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=echoprofile" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=echoprofile" />
    <link rel="shortcut icon" href="/favicon.ico?v=echoprofile" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=echoprofile" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>EchoProfile</title>

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0a12" />

    <!-- Do not load remote fonts before first paint. Desktop startup must not wait on network. -->

    <style>
      html, body, #root { min-height: 100%; }
      body { margin: 0; background: #080b12; color: #eef4ff; }
      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 12%, rgba(73, 180, 255, 0.22), transparent 34rem),
          radial-gradient(circle at 84% 72%, rgba(255, 176, 93, 0.16), transparent 30rem),
          linear-gradient(135deg, #080b12 0%, #101722 52%, #071118 100%);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .boot-shell__orb {
        position: fixed;
        width: 24rem;
        height: 24rem;
        border-radius: 999px;
        background: conic-gradient(from 210deg, #73d3ff, #ffe0a4, #95ffc9, #73d3ff);
        filter: blur(68px);
        opacity: 0.26;
        animation: boot-drift 4.8s ease-in-out infinite alternate;
      }
      .boot-shell__panel {
        position: relative;
        width: min(26rem, calc(100vw - 3rem));
        padding: 2rem;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 1.5rem;
        background: rgba(8, 13, 22, 0.72);
        box-shadow: 0 2rem 6rem rgba(0,0,0,0.4);
        backdrop-filter: blur(18px);
      }
      .boot-shell__eyebrow { font-size: 0.76rem; letter-spacing: 0.16em; text-transform: uppercase; color: #89ddff; }
      .boot-shell__title { margin-top: 0.65rem; font-size: 1.45rem; font-weight: 700; }
      .boot-shell__subtitle { margin-top: 0.4rem; color: rgba(238,244,255,0.68); font-size: 0.95rem; }
      .boot-shell__bar { height: 0.38rem; margin-top: 1.4rem; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,0.09); }
      .boot-shell__bar span { display: block; width: 42%; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #73d3ff, #ffe0a4); animation: boot-load 1.25s ease-in-out infinite; }
      @keyframes boot-load { 0% { transform: translateX(-110%); } 100% { transform: translateX(250%); } }
      @keyframes boot-drift { from { transform: translate3d(-8%, -4%, 0) scale(0.96); } to { transform: translate3d(7%, 5%, 0) scale(1.08); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell" aria-live="polite" aria-label="EchoProfile is starting">
        <div class="boot-shell__orb"></div>
        <div class="boot-shell__panel">
          <div class="boot-shell__eyebrow">EchoProfile</div>
          <div class="boot-shell__title">Preparing your workspace</div>
          <div class="boot-shell__subtitle">Loading the desktop UI...</div>
          <div class="boot-shell__bar"><span></span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
